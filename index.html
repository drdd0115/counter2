<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Counter2</title>
  <link rel="stylesheet" type="text/css" href="./css/style.css">
</head>
<body>
  <div class="counter">
    <div class="counter-number" id="js-counter">0</div>
      <button type="button" class="button js-button minus">-</button>
      <button type="button" class="button js-button plus">+</button>
      <button type="button" class="button" id="js-reset-button">Reset</button>

    <div class="step-area">
      <label for="step" class="step-label">増減値：</label>
      <select name="step-count" id="step" class="step-select">
        <option value="1">1</option>
        <option value="5">5</option>
        <option value="10">10</option>
      </select>
    </div>
    <label for="infomation">※下限値：0 上限値：100</label><br/>
    <label for="mouseDown">長押しで連続カウント</label>
  </div>

  <script src="./js/counter.js"></script>
  <script src="./js/reset.js"></script>
</body>
</html>
